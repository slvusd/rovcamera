logLevel: info
logDestinations: [stdout]

readTimeout: 10s
writeTimeout: 10s
writeQueueSize: 512
udpMaxPayloadSize: 1472

###############################################
# Authentication

authMethod: internal
authInternalUsers:
- user: any
  pass:
  ips: []
  permissions:
  - action: publish
    path:
  - action: read
    path:
  - action: playback
    path:
- user: any
  pass:
  ips: ['127.0.0.1', '::1']
  permissions:
  - action: api
  - action: metrics
  - action: pprof

###############################################
# Control API

api: yes
apiAddress: :9997
apiAllowOrigin: '*'

###############################################
# RTSP - TCP only for reliability

rtsp: yes
rtspTransports: [tcp]
rtspEncryption: "no"
rtspAddress: :8554
rtpAddress: :8000
rtcpAddress: :8001

###############################################
# RTMP - disabled

rtmp: no

###############################################
# HLS

hls: yes
hlsAddress: :8888
hlsEncryption: no
hlsAllowOrigin: '*'
hlsAlwaysRemux: yes
hlsVariant: lowLatency
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms
hlsSegmentMaxSize: 50M
hlsMuxerCloseAfter: 60s

###############################################
# WebRTC - Safari-compatible config

webrtc: yes
webrtcAddress: :8889
webrtcEncryption: no
webrtcAllowOrigin: '*'
webrtcLocalUDPAddress: :8189
webrtcLocalTCPAddress: :8190
webrtcIPsFromInterfaces: yes
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302

###############################################
# SRT - disabled

srt: no

###############################################
# Path defaults

pathDefaults:
  source: publisher
  record: no

###############################################
# Paths

paths:
  cam0:
    runOnInit: >
      ffmpeg -f v4l2 -input_format mjpeg -video_size 640x480 -framerate 15
      -i /dev/video0 -vf "vflip,hflip" -c:v libx264 -preset ultrafast -tune zerolatency
      -pix_fmt yuv420p -b:v 1200k
      -g 15 -keyint_min 15 -sc_threshold 0
      -profile:v baseline -level 3.1
      -f rtsp rtsp://localhost:$RTSP_PORT/$MTX_PATH
    runOnInitRestart: yes
  cam1:
    runOnInit: >
      ffmpeg -f v4l2 -input_format mjpeg -video_size 640x480 -framerate 15
      -i /dev/video4 -c:v libx264 -preset ultrafast -tune zerolatency
      -pix_fmt yuv420p -b:v 1200k
      -g 15 -keyint_min 15 -sc_threshold 0
      -profile:v baseline -level 3.1
      -f rtsp rtsp://localhost:$RTSP_PORT/$MTX_PATH
    runOnInitRestart: yes
  cam2:
    runOnInit: >
      ffmpeg -f v4l2 -input_format mjpeg -video_size 640x480 -framerate 15
      -i /dev/video8 -c:v libx264 -preset ultrafast -tune zerolatency
      -pix_fmt yuv420p -b:v 1200k
      -g 15 -keyint_min 15 -sc_threshold 0
      -profile:v baseline -level 3.1
      -f rtsp rtsp://localhost:$RTSP_PORT/$MTX_PATH
    runOnInitRestart: yes
