###############################################
# MediaMTX config - ROV cam0
###############################################

logLevel: info
logDestinations: [stdout]

readTimeout: 10s
writeTimeout: 10s
writeQueueSize: 512
udpMaxPayloadSize: 1472

###############################################
# RTSP
rtsp: yes
rtspTransports: [tcp]
rtspEncryption: "no"
rtspAddress: :8554
rtpAddress: :8000
rtcpAddress: :8001

###############################################
# RTMP - disabled, not needed
rtmp: no

###############################################
# HLS - disabled, not needed
hls: no

###############################################
# WebRTC
webrtc: yes
webrtcAddress: :8889
webrtcEncryption: no
webrtcAllowOrigin: '*'
webrtcLocalUDPAddress: :8189
webrtcLocalTCPAddress: :8190
webrtcIPsFromInterfaces: yes
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302

###############################################
# SRT - disabled, not needed
srt: no

###############################################
# API
api: yes
apiAddress: :9997

###############################################
# Paths

pathDefaults:
  record: no

paths:
  cam0:
    runOnInit: >
      ffmpeg
        -f v4l2 -input_format mjpeg -video_size 640x480 -framerate 15
        -i /dev/video0
        -c:v libx264 -preset ultrafast -tune zerolatency
        -pix_fmt yuv420p -b:v 1200k
        -g 15 -keyint_min 15 -sc_threshold 0
        -profile:v baseline -level 3.1
        -f rtsp rtsp://localhost:$RTSP_PORT/$MTX_PATH
    runOnInitRestart: yes
